    <style>
      .carousel {
        position: relative;
        height: 420px;
        border-radius: 12px;
        overflow: hidden;
        background: linear-gradient(135deg, #0d47a1, #1565c0);
      }
      .carousel-item {
        position: absolute;
        width: 100%;
        height: 100%;
        opacity: 0;
        transition: opacity 0.6s ease;
      }
      .carousel-item.active {
        opacity: 1;
      }
      .carousel-item img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      .carousel-caption {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        background: linear-gradient(transparent, rgba(0, 0, 0, 0.8));
        color: white;
        padding: 30px 25px 20px;
      }
      .carousel-caption h3 {
        color: white;
        font-size: 26px;
        margin-bottom: 8px;
      }
      .carousel-caption p {
        font-size: 15px;
        opacity: 0.9;
      }
      .carousel-indicators {
        position: absolute;
        bottom: 18px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        gap: 12px;
        z-index: 10;
      }
      .carousel-indicators button {
        width: 14px;
        height: 14px;
        border-radius: 50%;
        border: 3px solid white;
        background: transparent;
        cursor: pointer;
        padding: 0;
        transition: all 0.3s ease;
      }
      .carousel-indicators button.active {
        background: white;
        transform: scale(1.2);
      }
      .carousel-controls {
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        width: 48px;
        height: 48px;
        background: rgba(255, 255, 255, 0.3);
        border: none;
        border-radius: 50%;
        color: white;
        font-size: 28px;
        cursor: pointer;
        transition: all 0.3s ease;
        z-index: 10;
      }
      .carousel-controls:hover {
        background: rgba(255, 255, 255, 0.5);
      }
      .carousel-controls.prev {
        left: 18px;
      }
      .carousel-controls.next {
        right: 18px;
      }
    </style>
  </head>

      // ==================== 核心功能代码（保留在HTML中） ====================
      var currentSlide = 0;
      var slides, indicators, autoPlay;

      function showSlide(n) {
        slides[currentSlide].classList.remove("active");
        indicators[currentSlide].classList.remove("active");
        currentSlide = (n + slides.length) % slides.length;
        slides[currentSlide].classList.add("active");
        indicators[currentSlide].classList.add("active");
      }

      function changeSlide(d) {
        showSlide(currentSlide + d);
      }
      function goToSlide(n) {
        showSlide(n);
      }

      function updateTime() {
        var now = new Date();
        var time =
          now.getFullYear() +
          "-" +
          String(now.getMonth() + 1).padStart(2, "0") +
          "-" +
          String(now.getDate()).padStart(2, "0") +
          " " +
          String(now.getHours()).padStart(2, "0") +
          ":" +
          String(now.getMinutes()).padStart(2, "0") +
          ":" +
          String(now.getSeconds()).padStart(2, "0");
        document.querySelectorAll(".current-time").forEach(function (el) {
          el.textContent = time;
        });
      }

      document.addEventListener("DOMContentLoaded", function () {
        renderCarousel(indexData.slides);
        renderNotices(indexData.notices);
        renderMotto(indexData.motto);
        renderQuickLinks(indexData.quickLinks);
        renderFeatures(indexData.features);
        renderStats(indexData.stats);
        renderFooter(indexData.footer);

        slides = document.querySelectorAll(".carousel-item");
        indicators = document.querySelectorAll(".carousel-indicators button");

        autoPlay = setInterval(function () {
          showSlide(currentSlide + 1);
        }, 4000);

        var carousel = document.querySelector(".carousel");
        if (carousel) {
          carousel.addEventListener("mouseenter", function () {
            clearInterval(autoPlay);
          });
          carousel.addEventListener("mouseleave", function () {
            autoPlay = setInterval(function () {
              showSlide(currentSlide + 1);
            }, 4000);
          });
        }

        updateTime();
        setInterval(updateTime, 1000);
      });
